services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./configs/otelcol/config.yaml:/etc/otelcol/config.yaml
    depends_on:
      - tempo
      - loki
      - mimir

  tempo:
    image: grafana/tempo:2.10.1
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    ports:
      - "3200:3200"   # Tempo HTTP API (also used by Grafana MCP for trace queries)
    volumes:
      - ./configs/tempo/tempo.yaml:/etc/tempo/tempo.yaml
      - tempo_data:/var/tempo

  loki:
    image: grafana/loki:latest
    user: "0"
    command: ["-config.file=/etc/loki/loki.yaml"]
    ports:
      - "3100:3100"   # Loki HTTP API
    volumes:
      - ./configs/loki/loki.yaml:/etc/loki/loki.yaml
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  mimir:
    image: grafana/mimir:latest
    user: "0"
    command: ["-config.file=/etc/mimir/mimir.yaml"]
    ports:
      - "9009:9009"   # Mimir HTTP API / Prometheus-compatible endpoint
    volumes:
      - ./configs/mimir/mimir.yaml:/etc/mimir/mimir.yaml
      - mimir_data:/data/mimir

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"   # Grafana UI; MCP server at /apis/mcp.grafana.app/v1alpha1/...
    environment:
      GF_LOG_LEVEL: error
      GF_FEATURE_TOGGLES_ENABLE: mcpServer
      GF_INSTALL_PLUGINS: grafana-athena-datasource
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      tempo:
        condition: service_started
      loki:
        condition: service_started
      mimir:
        condition: service_started

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: hr_db
      POSTGRES_USER: hr_user
      POSTGRES_PASSWORD: hr_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hr_user -d hr_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  s3mock:
    image: adobe/s3mock:latest
    ports:
      - "9090:9090"
    environment:
      initialBuckets: halluchr-chats

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://hr_user:hr_pass@postgres:5432/hr_db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL
      - LLM_TEMPERATURE
      - LLM_MODEL=${LLM_MODEL:-openai:gpt-4o}
      - OTEL_SERVICE_NAME=hallucHR
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SEMCONV_STABILITY_OPT_IN=gen_ai_latest_experimental,http,database
      - OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT=span_only
      # - OTEL_INSTRUMENTATION_GENAI_COMPLETION_HOOK=upload
      # - OTEL_INSTRUMENTATION_GENAI_UPLOAD_BASE_PATH=s3://halluchr-chats/
      - AWS_ENDPOINT_URL=http://s3mock:9090
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
      s3mock:
        condition: service_started
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend

  eval-service:
    build:
      context: .
      dockerfile: eval_service/Dockerfile
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_API_KEY_EVAL: ${OPENAI_API_KEY_EVAL}
      TEMPO_URL: http://tempo:3200
      OTEL_SERVICE_NAME: hallucEvals
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      AWS_ENDPOINT_URL: http://s3mock:9090
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      EVAL_INTERVAL_SECONDS: "120"
      EVAL_LOOKBACK_SECONDS: "300"
      OTEL_SEMCONV_STABILITY_OPT_IN: gen_ai_latest_experimental,http
    depends_on:
      - tempo
      - otel-collector
      - s3mock

volumes:
  postgres_data:
  tempo_data:
  loki_data:
  mimir_data:
  grafana_data:
