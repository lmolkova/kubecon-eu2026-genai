services:
  lgtm:
    image: grafana/otel-lgtm:latest
    ports:
      - "3000:3000"   # Grafana UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: hr_db
      POSTGRES_USER: hr_user
      POSTGRES_PASSWORD: hr_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hr_user -d hr_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  s3mock:
    image: adobe/s3mock:latest
    ports:
      - "9090:9090"
    environment:
      initialBuckets: hr-assistant-chats

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://hr_user:hr_pass@postgres:5432/hr_db
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OTEL_SERVICE_NAME: hr-ai-assistant
      OTEL_EXPORTER_OTLP_ENDPOINT: http://lgtm:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SEMCONV_STABILITY_OPT_IN: gen_ai_latest_experimental
      #OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT: span_only
      OTEL_INSTRUMENTATION_GENAI_COMPLETION_HOOK: upload
      OTEL_INSTRUMENTATION_GENAI_UPLOAD_BASE_PATH: s3://hr-assistant-chats/
      AWS_ENDPOINT_URL: http://s3mock:9090
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    depends_on:
      postgres:
        condition: service_healthy
      lgtm:
        condition: service_started
      s3mock:
        condition: service_started
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend

volumes:
  postgres_data:
